apiVersion: clcm.openshift.io/v1alpha1
kind: ClusterTemplate
metadata:
  name: clustertemplate-sample.v1.0.0
  namespace: clustertemplate-a-v4-20-15
spec:
  name: clustertemplate-sample
  description: nice description
  version: v1.0.0
  release: 4.20.15
  characteristics:
    age: "31"
  metadata:
    apple: "23"
  templateDefaults:
    hwMgmtDefaults:
      hardwareProvisioningTimeout: "90m"
      nodeGroupData:
        - name: controller
          role: master
          hwProfile: hardwareprofile-sample
          resourceSelector:
            resourceselector.clcm.openshift.io/server-type: xr8620t
        - name: worker
          role: worker
          hwProfile: hardwareprofile-sample
          resourceSelector:
            resourceselector.clcm.openshift.io/server-type: xr12380c
    clusterInstanceDefaults: clustertemplate-sample.v1.0.0-clusterinstance-defaults
    policyTemplateDefaults: clustertemplate-sample.v1.0.0-policytemplate-defaults
    upgradeDefaults:
      imageBasedGroupUpgrade:
        ibuSpec:
          seedImageRef:
            image: "quay.io/seed-repo/seed-image:4.20.15"
            version: "4.20.15"
          oadpContent:
            - name: sno-ran-du-ibu-platform-backup-v4-20-15-1
              namespace: openshift-adp
          autoRollbackOnFailure:
            initMonitorTimeoutSeconds: 1800
        plan:
          - actions: ["Prep"]
            rolloutStrategy:
              maxConcurrency: 1
              timeout: 15
          - actions: ["AbortOnFailure"]
            rolloutStrategy:
              maxConcurrency: 1
              timeout: 5
          - actions: ["Upgrade"]
            rolloutStrategy:
              maxConcurrency: 1
              timeout: 60
          - actions: ["AbortOnFailure"]
            rolloutStrategy:
              maxConcurrency: 1
              timeout: 5
          - actions: ["FinalizeUpgrade"]
            rolloutStrategy:
              maxConcurrency: 1
              timeout: 5
  templateParameterSchema:
    properties:
      nodeClusterName:
        type: string
      oCloudSiteId:
        type: string
      hwMgmtParameters:
        description: >
          hwMgmtParameters allows overriding hardware management defaults
          such as hardwareProvisioningTimeout and per-nodeGroup settings.
        properties:
          hardwareProvisioningTimeout:
            type: string
          nodeGroupData:
            type: array
            items:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                role:
                  type: string
                  enum:
                    - master
                    - worker
                hwProfile:
                  type: string
                resourcePoolId:
                  type: string
                resourceSelector:
                  type: object
                  additionalProperties:
                    type: string
        type: object
      policyTemplateParameters:
        description: policyTemplateParameters defines the available parameters for cluster configuration
        properties:
          sriov-network-vlan-1:
            type: string
          sriov-network-vlan-2:
            type: string
          sriov-network-pfNames-1:
            type: string
          sriov-network-pfNames-2:
            type: string
          cpu-isolated:
            type: string
          cpu-reserved:
            type: string
          hugepages-default:
            type: string
          hugepages-size:
            type: string
          hugepages-count:
            type: string
          install-plan-approval:
            type: string
        type: object
      upgradeParameters:
        description: >
          upgradeParameters allows overriding upgrade defaults defined in
          templateDefaults.upgradeDefaults. Values provided here are deep-merged
          on top of the defaults, with ProvisioningRequest values taking precedence.
        properties:
          imageBasedGroupUpgrade:
            type: object
            properties:
              ibuSpec:
                description: ImageBasedUpgradeSpec defines the desired state of ImageBasedUpgrade
                properties:
                  autoRollbackOnFailure:
                    description: |-
                      AutoRollbackOnFailure defines automatic rollback settings if the upgrade fails or if the upgrade does not
                      complete within the specified time limit.
                    properties:
                      initMonitorTimeoutSeconds:
                        description: |-
                          InitMonitorTimeoutSeconds defines the time frame in seconds. If not defined or set to 0, the default value of
                          1800 seconds (30 minutes) is used.
                        minimum: 0
                        type: integer
                    type: object
                  oadpContent:
                    description: OADPContent defines the list of ConfigMap resources
                      that contain the OADP Backup and Restore CRs.
                    items:
                      description: ConfigMapRef defines a reference to a config map
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                      type: object
                    type: array
                  seedImageRef:
                    description: SeedImageRef defines the seed image and OCP version
                      for the upgrade
                    properties:
                      image:
                        description: Image defines the full pull-spec of the seed
                          container image to use.
                        minLength: 1
                        type: string
                      pullSecretRef:
                        description: PullSecretRef defines the reference to a secret
                          with credentials to pull container images.
                        properties:
                          name:
                            type: string
                        type: object
                      version:
                        description: Version defines the target platform version.
                          The value must match the version of the seed image.
                        type: string
                    type: object
                type: object
              plan:
                items:
                  properties:
                    actions:
                      items:
                        type: string
                      maxItems: 4
                      type: array
                    rolloutStrategy:
                      description: RolloutStrategy defines how to rollout ibu
                      properties:
                        maxConcurrency:
                          type: integer
                        timeout:
                          type: integer
                      type: object
                  type: object
                maxItems: 6
                type: array
        type: object
      clusterInstanceParameters:
        description: clusterInstanceParameters defines the available parameters for cluster installation
        properties:
          additionalNTPSources:
            description: AdditionalNTPSources is a list of NTP sources (hostname
              or IP) to be added to all cluster hosts. They are added to any NTP
              sources that were configured through other means.
            items:
              type: string
            type: array
          apiVIPs:
            description: APIVIPs are the virtual IPs used to reach the OpenShift
              cluster's API. Enter one IP address for single-stack clusters, or
              up to two for dual-stack clusters (at most one IP address per IP
              stack used). The order of stacks should be the same as order of
              subnets in Cluster Networks, Service Networks, and Machine Networks.
            items:
              type: string
            maxItems: 2
            type: array
          baseDomain:
            description: BaseDomain is the base domain to use for the deployed
              cluster.
            type: string
          clusterName:
            description: ClusterName is the name of the cluster.
            type: string
          extraAnnotations:
            additionalProperties:
              additionalProperties:
                type: string
              type: object
            description: Additional cluster-wide annotations to be applied to
              the rendered templates
            type: object
          extraLabels:
            additionalProperties:
              additionalProperties:
                type: string
              type: object
            description: Additional cluster-wide labels to be applied to the rendered
              templates
            type: object
          ingressVIPs:
            description: IngressVIPs are the virtual IPs used for cluster ingress
              traffic. Enter one IP address for single-stack clusters, or up to
              two for dual-stack clusters (at most one IP address per IP stack
              used). The order of stacks should be the same as order of subnets
              in Cluster Networks, Service Networks, and Machine Networks.
            items:
              type: string
            maxItems: 2
            type: array
          machineNetwork:
            description: MachineNetwork is the list of IP address pools for machines.
            items:
              description: MachineNetworkEntry is a single IP address block for
                node IP blocks.
              properties:
                cidr:
                  description: CIDR is the IP block address pool for machines
                    within the cluster.
                  type: string
              required:
              - cidr
              type: object
            type: array
          nodes:
            items:
              description: NodeSpec
              properties:
                extraAnnotations:
                  additionalProperties:
                    additionalProperties:
                      type: string
                    type: object
                  description: Additional node-level annotations to be applied
                    to the rendered templates
                  type: object
                extraLabels:
                  additionalProperties:
                    additionalProperties:
                      type: string
                    type: object
                  description: Additional node-level labels to be applied to the
                    rendered templates
                  type: object
                hostName:
                  description: Hostname is the desired hostname for the host
                  type: string
                nodeLabels:
                  additionalProperties:
                    type: string
                  description: NodeLabels allows the specification of custom roles
                    for your nodes in your managed clusters. These are additional
                    roles are not used by any OpenShift Container Platform components,
                    only by the user. When you add a custom role, it can be associated
                    with a custom machine config pool that references a specific
                    configuration for that role. Adding custom labels or roles
                    during installation makes the deployment process more effective
                    and prevents the need for additional reboots after the installation
                    is complete.
                  type: object
                nodeNetwork:
                  description: NodeNetwork is a set of configurations pertaining
                    to the network settings for the node.
                  properties:
                    config:
                      description: yaml that can be processed by nmstate, using
                        custom marshaling/unmarshaling that will allow to populate
                        nmstate config as plain yaml.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  type: object
              required:
              - hostName
              type: object
            type: array
          serviceNetwork:
            description: ServiceNetwork is the list of IP address pools for services.
            items:
              description: ServiceNetworkEntry is a single IP address block for
                node IP blocks.
              properties:
                cidr:
                  description: CIDR is the IP block address pool for machines
                    within the cluster.
                  type: string
              required:
              - cidr
              type: object
            type: array
          sshPublicKey:
            description: SSHPublicKey is the public Secure Shell (SSH) key to
              provide access to instances. This key will be added to the host
              to allow ssh access
            type: string
        required:
        - clusterName
        - nodes
        type: object
    required:
      - nodeClusterName
      - oCloudSiteId
      - policyTemplateParameters
      - clusterInstanceParameters
    type: object
status:
  conditions: []
