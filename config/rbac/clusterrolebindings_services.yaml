# Service ClusterRoleBindings — bind each service SA to its ClusterRole
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alarms-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alarms-server
subjects:
- kind: ServiceAccount
  name: alarms-server
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: artifacts-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: artifacts-server
subjects:
- kind: ServiceAccount
  name: artifacts-server
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-server
subjects:
- kind: ServiceAccount
  name: cluster-server
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hardwaremanager-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hardwaremanager-server
subjects:
- kind: ServiceAccount
  name: hardwaremanager-server
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provisioning-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: provisioning-server
subjects:
- kind: ServiceAccount
  name: provisioning-server
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: resource-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: resource-server
subjects:
- kind: ServiceAccount
  name: resource-server
  namespace: system
---
