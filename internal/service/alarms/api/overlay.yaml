overlay: 1.0.0
info:
  title: Internal Endpoints Overlay
  version: 1.0.0
actions:
  - target: "$.paths"
    update:
      /internal/v1/caas-alerts/alertmanager:
        post:
          operationId: AmNotification
          summary: Receive Alertmanager notifications
          description: Receives alerts from Alertmanager and notifies subscribers if available.
          # x-allow-default-audience: Accept both the service-specific audience
          # and the default Kubernetes API server audience
          # (https://kubernetes.default.svc) for this endpoint. ACM's
          # alertmanager webhook http_config uses credentials_file to read the
          # pod's mounted SA token, which carries the default API server
          # audience. We do not control the alertmanager pod and cannot mount a
          # projected volume with a custom audience token.
          #
          # Authentication is still enforced via Kubernetes TokenReview (caller
          # identity is verified and the token's audience must match either the
          # service-specific or default Kubernetes audience), and authorization
          # is enforced via RBAC (only the alertmanager SA in the
          # open-cluster-management-observability namespace is granted access
          # to this path).
          x-allow-default-audience: true
          tags:
            - internal
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/AlertmanagerNotification"
          responses:
            '200':
              description: Notification received successfully
            '400':
              description: Bad request
            '500':
              description: Internal server error
      /internal/v1/hardware-alerts/{hwVendorName}:
        post:
          operationId: HwNotification
          summary: Receive hardware alerts
          description: Receives hardware alerts for the specified vendor.
          tags:
            - internal
          parameters:
            - in: path
              name: hwVendorName
              required: true
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/HardwareAlert"
          responses:
            '200':
              description: Hardware alert received successfully
            '400':
              description: Bad request
            '500':
              description: Internal server error
